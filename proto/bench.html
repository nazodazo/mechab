<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>WARCLOCK // ARSENAL BENCH</title>
<style>
/* Arsenal bench v2 — frequency-mixing tuner. Each weapon has a target spectrum
   (its formula); you shape a mix of oscillator channels to match it. Fit rating
   burns into the shared profile, and the theatre reads it as real weapon stats. */
:root{
  --bg:#17171b; --panel:#1e1e24; --ink:#e8e4d8; --dim:#8a8778; --line:#34343c;
  --us:#d8ff3d; --foe:#ff5a2a; --amber:#ffb63d;
  --mono:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0}
html,body{height:100%;overflow:hidden}
body{position:fixed;inset:0;width:100%;background:var(--bg);color:var(--ink);
  font-family:var(--mono);font-size:12px;line-height:1.35;
  -webkit-user-select:none;user-select:none;overscroll-behavior:none;display:flex;justify-content:center}
@supports (height:100dvh){ html,body{height:100dvh} }
#device{width:100%;max-width:460px;height:100%;overflow:hidden;display:flex;flex-direction:column;gap:8px;
  padding:calc(8px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom))}
.card{border:1px solid var(--line);background:var(--panel);border-radius:5px;
  display:flex;flex-direction:column;overflow:hidden}
.card>.ph{flex:none;padding:6px 10px 3px;font-size:9px;letter-spacing:.18em;color:var(--dim)}

#top{display:flex;gap:8px;align-items:baseline;padding:0 2px;color:var(--dim);font-size:11px;letter-spacing:.08em}
#top b{color:var(--ink);font-weight:400}
#top .link{margin-left:auto;font-size:10px}

/* weapon select: one card per arsenal item */
#weapons{flex:none;display:flex;gap:6px}
.wpn{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:5px;color:var(--ink);
  font-family:var(--mono);font-size:11px;letter-spacing:.04em;padding:7px 8px;text-align:left;
  display:flex;flex-direction:column;gap:2px;touch-action:manipulation}
.wpn .k{font-size:9px;color:var(--dim);letter-spacing:.14em}
.wpn .mk{font-size:10px;color:var(--dim)}
.wpn.on{border-color:var(--us)} .wpn.on .k{color:var(--us)}

/* spectral display: the high-resolution gauge */
#specwrap{flex:1.2;min-height:0;padding:0 8px 8px}
#spec{width:100%;height:100%;display:block}

/* mixer: 4 oscillator channel cards */
#mixer{flex:1.4;min-height:0;display:flex;flex-direction:column;gap:6px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none}
#mixer::-webkit-scrollbar{display:none}
.ch{flex:none;border:1px solid var(--line);background:var(--panel);border-radius:5px;padding:6px 9px;
  display:grid;grid-template-columns:34px 1fr 1fr 1fr;gap:8px;align-items:center}
.ch .nm{font-size:11px;letter-spacing:.1em;color:var(--us)}
.ch.mute .nm{color:var(--line)}
.param{display:flex;flex-direction:column;gap:2px;min-width:0}
.param .pk{font-size:8px;color:var(--dim);letter-spacing:.14em}
.param .row{display:flex;align-items:center;gap:4px}
.param button{width:26px;height:24px;background:var(--bg);border:1px solid var(--line);color:var(--ink);
  font-family:var(--mono);font-size:13px;border-radius:3px;touch-action:manipulation;flex:none}
.param button:active{background:var(--ink);color:var(--bg)}
.param .pv{flex:1;text-align:center;font-size:11px;font-variant-numeric:tabular-nums}

/* commit row */
#commit{flex:none;display:flex;gap:8px;align-items:stretch}
#fit{width:38%;flex:none;border:1px solid var(--line);background:var(--panel);border-radius:5px;
  padding:6px 10px;display:flex;flex-direction:column;justify-content:center}
#fit .k{font-size:9px;color:var(--dim);letter-spacing:.14em}
#fit .v{font-size:20px;font-variant-numeric:tabular-nums}
#burn{flex:1;background:var(--panel);border:1px solid var(--us);color:var(--us);border-radius:5px;
  font-family:var(--mono);font-size:13px;letter-spacing:.1em;touch-action:manipulation}
#burn:active{background:var(--us);color:var(--bg)}
#burn.armed{border-color:var(--amber);color:var(--amber)}
#burn[disabled]{opacity:.3}
#note{flex:none;font-size:10px;color:var(--dim);padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<main id="device">
  <div id="top"><b>ARSENAL BENCH</b><span>frequency lab</span><span class="link" id="proflink">—</span></div>
  <div id="weapons">
    <button class="wpn" id="w0"></button><button class="wpn" id="w1"></button><button class="wpn" id="w2"></button>
  </div>
  <div class="card" id="specwrap"><span class="ph">SPECTRUM — shape the mix onto the target curve</span><canvas id="spec"></canvas></div>
  <div id="mixer"></div>
  <div id="commit">
    <div id="fit"><span class="k">FIT</span><span class="v" id="fitv">0%</span></div>
    <button id="burn">BURN-IN CALIBRATION</button>
  </div>
  <div id="note">fit burns into the command profile — the theatre reads it as live weapon performance</div>
</main>

<script>
"use strict";
var BINS=48;
/* each weapon's formula is a fixed target spectrum: peaks it wants hit.
   deterministic per weapon — the puzzle is legible and learnable. */
function gauss(x,mu,sg){ var z=(x-mu)/sg; return Math.exp(-z*z/2); }
var WEAPONS=[
  {id:"TOMAHAWK", name:"TOMAHAWK", desc:"cruise airframe",
   tgt:function(b){ var x=b/BINS;
     return gauss(x,0.22,0.06)*0.9 + gauss(x,0.62,0.09)*0.7; }},
  {id:"ORBITAL",  name:"ORBITAL LANCE", desc:"beam coherence",
   tgt:function(b){ var x=b/BINS;
     return gauss(x,0.15,0.04)*0.8 + gauss(x,0.5,0.05)*1.0 + gauss(x,0.85,0.06)*0.6; }},
  {id:"MECHA",    name:"MECHA DROP", desc:"chassis resonance",
   tgt:function(b){ var x=b/BINS;
     return gauss(x,0.35,0.16)*0.85 + gauss(x,0.78,0.05)*0.5; }},
];

/* shared profile — same key the theatre uses */
var P=(function(){
  try{ var p=JSON.parse(localStorage.getItem("warclock_profile"));
       if (p && p.v===1) return p; }catch(e){}
  return {v:1, sorties:0, wins:0, verdicts:[], crew:null};
})();
if (!P.arsenal) P.arsenal={};
function saveP(){ try{ localStorage.setItem("warclock_profile",JSON.stringify(P)); }catch(e){} }

/* mixer state: 4 oscillator channels. FREQ/WIDTH/GAIN each stepped, not slid —
   discrete moves keep it instrument-like and tunable by feel. */
var cur=0, armT=0;
var CH;
function chDefault(){
  return [ {f:0.25,w:0.08,g:0.5}, {f:0.5,w:0.08,g:0.5},
           {f:0.75,w:0.08,g:0.0}, {f:0.4,w:0.16,g:0.0} ];
}
function loadCh(){
  var a=P.arsenal[WEAPONS[cur].id];
  CH=(a&&a.ch)?a.ch.map(function(c){return {f:c.f,w:c.w,g:c.g};}):chDefault();
}
function mixAt(x){
  var v=0;
  for (var k=0;k<CH.length;k++) v+=gauss(x,CH[k].f,Math.max(0.02,CH[k].w))*CH[k].g;
  return v;
}
function fit(){
  var err=0,tot=0;
  for (var b=0;b<BINS;b++){ var x=b/BINS, t=WEAPONS[cur].tgt(b), m=mixAt(x);
    err+=Math.abs(m-t); tot+=t; }
  return Math.max(0,1-err/tot);
}

/* ============ render ============ */
var spec=document.getElementById("spec"), sctx=spec.getContext("2d");
function fitCanvas(c){ var r=c.getBoundingClientRect(), d=window.devicePixelRatio||1;
  if (!r.width) return;
  var w=Math.round(r.width*d), h=Math.round(r.height*d);
  if (c.width!==w||c.height!==h){ c.width=w; c.height=h; } }
function drawSpec(){
  fitCanvas(spec);
  var W=spec.width,H=spec.height,d=window.devicePixelRatio||1;
  sctx.clearRect(0,0,W,H);
  var pad=8*d, bw=(W-pad*2)/BINS, base=H-14*d, top=10*d, span=base-top;
  var TOL=0.12;
  for (var b=0;b<BINS;b++){
    var x=b/BINS, t=WEAPONS[cur].tgt(b), m=mixAt(x);
    var bx=pad+b*bw;
    // current mix: the spectral bar. within tolerance = green, hot = red, cold = dim
    var col = Math.abs(m-t)<=TOL ? "#d8ff3d" : m>t ? "#ff5a2a" : "#4a4a54";
    var mh=Math.min(1.15,m)*span;
    sctx.fillStyle=col;
    sctx.fillRect(bx,base-mh,Math.max(1,bw*0.7),mh);
    // target curve: ticks riding above the bars
    var th=Math.min(1.15,t)*span;
    sctx.fillStyle="rgba(232,228,216,.85)";
    sctx.fillRect(bx,base-th-1.5*d,Math.max(1,bw*0.7),1.5*d);
  }
  sctx.strokeStyle="#34343c";
  sctx.beginPath(); sctx.moveTo(pad,base); sctx.lineTo(W-pad,base); sctx.stroke();
  // channel markers along the base
  CH.forEach(function(c,k){
    if (c.g<=0) return;
    var cx=pad+c.f*(W-pad*2);
    sctx.fillStyle="#ffb63d"; sctx.font=(8*d)+"px monospace"; sctx.textAlign="center";
    sctx.fillText(String.fromCharCode(65+k),cx,base+10*d);
  });
}
function renderWeapons(){
  WEAPONS.forEach(function(w,k){
    var el=document.getElementById("w"+k);
    var a=P.arsenal[w.id];
    var mk=a?("MK "+(1+Math.round(a.fit*3))+" · "+Math.round(a.fit*100)+"%"):"uncalibrated";
    el.className="wpn"+(k===cur?" on":"");
    el.innerHTML='<span class="k">'+w.name+'</span><span class="mk">'+mk+'</span>';
  });
  document.getElementById("proflink").textContent=
    P.sorties?("profile: "+P.sorties+" sorties"):"profile: fresh";
}
function renderMixer(){
  document.getElementById("mixer").innerHTML=CH.map(function(c,k){
    function param(pk,val,dk){
      return '<div class="param"><span class="pk">'+pk+'</span><div class="row">'
        +'<button data-ch="'+k+'" data-p="'+dk+'" data-d="-1">−</button>'
        +'<span class="pv">'+val+'</span>'
        +'<button data-ch="'+k+'" data-p="'+dk+'" data-d="1">+</button></div></div>';
    }
    return '<div class="ch'+(c.g<=0?" mute":"")+'"><span class="nm">OSC '+String.fromCharCode(65+k)+'</span>'
      +param("FREQ",Math.round(c.f*100),"f")
      +param("WIDTH",Math.round(c.w*100),"w")
      +param("GAIN",Math.round(c.g*100),"g")
      +'</div>';
  }).join("");
}
function renderFit(){
  var f=fit();
  document.getElementById("fitv").textContent=Math.round(f*100)+"%";
  document.getElementById("fitv").style.color = f>0.8?"#d8ff3d":f>0.5?"#ffb63d":"#e8e4d8";
  var burn=document.getElementById("burn");
  var a=P.arsenal[WEAPONS[cur].id];
  burn.disabled = !!(a && f<=a.fit);              // only better calibrations burn
}

/* ============ input ============ */
document.getElementById("mixer").addEventListener("click",function(e){
  var b=e.target.closest("button"); if (!b) return;
  var c=CH[+b.dataset.ch], p=b.dataset.p, dl=+b.dataset.d;
  var step = p==="f"?0.02 : p==="w"?0.01 : 0.05;
  c[p]=Math.max(0,Math.min(p==="f"?1:p==="w"?0.3:1.2, c[p]+dl*step));
  renderMixer(); renderFit(); drawSpec();
});
WEAPONS.forEach(function(w,k){
  document.getElementById("w"+k).addEventListener("click",function(){
    cur=k; loadCh(); renderWeapons(); renderMixer(); renderFit(); drawSpec();
  });
});
var burnEl=document.getElementById("burn");
burnEl.addEventListener("click",function(){
  if (burnEl.disabled) return;
  if (armT<=0){ armT=2.5; burnEl.classList.add("armed"); burnEl.textContent="CONFIRM BURN-IN ▸"; return; }
  armT=0; burnEl.classList.remove("armed"); burnEl.textContent="BURN-IN CALIBRATION";
  var f=fit();
  P.arsenal[WEAPONS[cur].id]={fit:Math.round(f*100)/100, ch:CH.map(function(c){return {f:c.f,w:c.w,g:c.g};})};
  saveP(); renderWeapons(); renderFit();
  document.getElementById("note").textContent=
    WEAPONS[cur].name+" calibrated at "+Math.round(f*100)+"% — live in the next sortie";
});
setInterval(function(){ if (armT>0){ armT-=0.1;
  if (armT<=0){ burnEl.classList.remove("armed"); burnEl.textContent="BURN-IN CALIBRATION"; } } },100);

loadCh(); renderWeapons(); renderMixer(); renderFit(); drawSpec();
window.addEventListener("resize",drawSpec);
</script>
</body>
</html>
