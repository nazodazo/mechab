<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>WARCLOCK // proto v5</title>
<style>
/* v5 — mass war, surgical operatives. Hundreds of line troops pour in from
   both edges and grind the front; operatives work behind it; LAOE weapons
   (mecha / tomahawk / orbital) punch holes. You own one team and the keys. */
:root{
  --bg:#17171b; --panel:#1e1e24; --ink:#e8e4d8; --dim:#8a8778; --line:#34343c;
  --us:#d8ff3d; --foe:#ff5a2a; --amber:#ffb63d;
  --mono:"SF Mono",ui-monospace,"Cascadia Mono","Roboto Mono",Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0}
html,body{height:100%;overflow:hidden}
body{position:fixed;inset:0;width:100%;background:var(--bg);color:var(--ink);
  font-family:var(--mono);font-size:12px;line-height:1.35;
  -webkit-user-select:none;user-select:none;overscroll-behavior:none;display:flex;justify-content:center}
@supports (height:100dvh){ html,body{height:100dvh} }
#device{width:100%;max-width:460px;height:100%;display:flex;flex-direction:column;gap:9px;
  padding:calc(6px + env(safe-area-inset-top)) 10px calc(8px + env(safe-area-inset-bottom))}
.panel{border:1px solid var(--line);background:var(--panel);position:relative}
.panel>.ph{position:absolute;top:-1px;left:8px;transform:translateY(-50%);
  background:var(--bg);padding:0 6px;font-size:9px;letter-spacing:.18em;color:var(--dim)}

#topbar{display:flex;gap:8px;align-items:baseline;color:var(--dim);font-size:11px;
  letter-spacing:.08em;padding:0 2px}
#bclock{color:var(--ink);font-variant-numeric:tabular-nums}
#phase{flex:1;text-align:center;overflow:hidden;white-space:nowrap}
#btnpause{background:transparent;border:1px solid var(--line);color:var(--ink);
  font-family:var(--mono);font-size:11px;padding:2px 10px;touch-action:manipulation}
#btnpause.on{border-color:var(--amber);color:var(--amber)}
#tidepct{font-variant-numeric:tabular-nums}

#mapwrap{height:32%;flex:none;padding:6px}
#map{width:100%;height:100%;display:block;image-rendering:pixelated;touch-action:none}
#trendwrap{height:8%;flex:none;padding:5px 6px}
#trend{width:100%;height:100%;display:block}

/* ticker: IMPORTANT events only */
#ticker{flex:none;border:1px solid var(--amber);background:var(--bg);
  overflow:hidden;height:22px;position:relative}
#tickin{position:absolute;left:0;top:0;white-space:nowrap;line-height:22px;font-size:11px;
  will-change:transform;animation:tk linear infinite}
@keyframes tk{to{transform:translateX(-50%)}}
#tickin .up{color:var(--us)} #tickin .bad{color:var(--foe)} #tickin .rq{color:var(--amber)}
#tickin .sep{color:var(--line);padding:0 8px}
/* overview: everything else, two lines, steps up two at a time */
#feed{flex:none;height:34px;overflow:hidden;border:1px solid var(--line);border-top:0;
  background:var(--bg);padding:1px 8px;font-size:11px;line-height:16px}
#feed div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dim)}
#feed .up{color:var(--us)} #feed .bad{color:var(--foe)} #feed .rq{color:var(--amber)} #feed .team{color:var(--ink)}

#deck{flex:1;margin-top:5px;padding:10px 8px 8px;display:flex;flex-direction:column;gap:6px;overflow:hidden}
#reqbar{border:1px solid var(--amber);padding:4px 8px;display:none;flex:none}
#reqbar.on{display:block}
#reqbar .t{color:var(--amber);font-size:11px}
#reqwin{height:5px;background:var(--bg);margin-top:3px}
#reqwin i{display:block;height:100%;background:var(--amber);width:100%}
#deckmain{flex:1;display:flex;gap:8px;min-height:0}
/* left: two text tiles + the forces pictogram */
#leftcol{width:42%;flex:none;display:flex;flex-direction:column;gap:4px;min-height:0}
#tiles{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.stat{border:1px solid var(--line);padding:3px 7px;background:var(--bg);
  display:flex;justify-content:space-between;align-items:baseline}
.stat .k{color:var(--dim);font-size:9px;letter-spacing:.1em}
.stat .v{font-size:13px;font-variant-numeric:tabular-nums}
.stat.low .v{color:var(--foe)}
#forces{flex:1;width:100%;border:1px solid var(--line);background:var(--bg);
  image-rendering:pixelated;min-height:0}
#squads{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.sq{border:1px solid var(--line);background:var(--bg);padding:3px 7px;
  display:grid;grid-template-columns:auto 1fr auto;gap:7px;align-items:baseline}
.sq .nm{white-space:nowrap}
.sq.mine{border-color:var(--us)}
.sq .nm{font-size:11px;letter-spacing:.06em}
.sq.mine .nm{color:var(--us)}
.sq .st{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sq .hp{font-size:10px;letter-spacing:.1em}
.sq .hp b{color:var(--us);font-weight:400} .sq .hp span{color:var(--line)}
#hostiles{font-size:10px;color:var(--foe);letter-spacing:.06em;padding:1px 2px}
/* war ledger: fills the idle space with the macro story */
#ledger{margin-top:auto;border:1px solid var(--line);background:var(--bg);
  padding:4px 8px;font-size:10px;color:var(--dim);line-height:1.6}
#ledger b{color:var(--ink);font-weight:400}
#ledger .up{color:var(--us)} #ledger .bad{color:var(--foe)}
#ledger .lrow{display:flex;justify-content:space-between}

/* actions: stacked vertically, press-arm-confirm */
#actions{display:flex;flex-direction:column;gap:5px;flex:none}
#actions button{padding:9px 12px;font-family:var(--mono);font-size:12px;letter-spacing:.05em;
  background:var(--bg);border:1px solid var(--line);color:var(--ink);text-align:left;
  display:flex;justify-content:space-between;
  touch-action:manipulation;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#actions button .cost{color:var(--dim);font-size:10px}
#actions button:active{background:var(--ink);color:var(--bg)}
#actions button[disabled]{opacity:.28}
#actions button.armed{border-color:var(--us);color:var(--us)}
#actions button.hot{border-color:var(--amber);color:var(--amber)}
#actions button.togon{border-color:var(--us);color:var(--us)}

#debrief{position:absolute;inset:0;background:rgba(23,23,27,.97);display:none;
  flex-direction:column;padding:40px 24px;gap:10px;z-index:5}
#debrief.on{display:flex}
#debrief h2{font-size:18px;font-weight:400;letter-spacing:.1em}
#receipts{flex:1;overflow-y:auto;font-size:11px;color:var(--dim);white-space:pre-wrap}
#receipts b{color:var(--ink);font-weight:400}
#again{padding:14px;background:transparent;border:1px solid var(--us);color:var(--us);
  font-family:var(--mono);letter-spacing:.14em;font-size:13px}
</style>
</head>
<body>
<main id="device">
  <div id="topbar"><span id="bclock">180</span><span id="phase">THEATRE 7 // LIVE</span>
    <button id="btnpause">⏸</button><span id="tidepct">TIDE —</span></div>
  <div id="mapwrap" class="panel"><span class="ph">THEATRE — tap to designate 141's objective</span><canvas id="map"></canvas></div>
  <div id="trendwrap" class="panel"><span class="ph">TIDE</span><canvas id="trend"></canvas></div>
  <div id="ticker"><div id="tickin"></div></div>
  <div id="feed"></div>
  <section id="deck" class="panel"><span class="ph">OPERATIONS</span>
    <div id="reqbar"><span class="t" id="reqtxt"></span><div id="reqwin"><i></i></div></div>
    <div id="deckmain">
      <div id="leftcol">
        <div id="tiles"></div>
        <canvas id="forces"></canvas>
      </div>
      <div id="squads"></div>
    </div>
    <div id="actions">
      <button id="b0"></button><button id="b1"></button><button id="b2"></button>
      <button id="b3"></button><button id="b4"></button>
    </div>
  </section>
  <div id="debrief"><h2 id="verdict">—</h2><div id="receipts"></div><button id="again">RE-RUN THEATRE</button></div>
</main>

<script>
"use strict";
/* ================= front ================= */
var GW=128, GH=80, N=GW*GH;
var BW=8, BX=GW/BW, BY=GH/BW;
var mapC=document.getElementById("map"), mctx=mapC.getContext("2d");
var trC=document.getElementById("trend"), tctx=trC.getContext("2d");
var fcC=document.getElementById("forces"), fctx=fcC.getContext("2d");
var buf=document.createElement("canvas"); buf.width=GW; buf.height=GH;
var bctx=buf.getContext("2d"), img=bctx.createImageData(GW,GH);
function fit(c){ var r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;
  c.width=Math.round(r.width*d); c.height=Math.round(r.height*d);
  c.getContext("2d").imageSmoothingEnabled=false; }

/* line troops: the mass of the war. hundreds, both sides, pouring inward. */
var TN=260;
function mkTroop(side){
  return { side:side, x: side>0?1+Math.random()*2:GW-3+Math.random()*2,
           y: Math.random()*GH, dead:0, jig:Math.random()*6.28 };
}
var S;
function reset(){
  S={ t:180, over:false, paused:false, caTimer:0,
      c:new Float32Array(N), terr:new Uint8Array(N),
      req:300, cas:3, mat:0,
      tide:0, hist:[], marks:[], receipts:[],
      hotspots:[], hotTimer:0, designated:-1,
      cue:null, arm:[0,0,0,0,0],
      mechaCd:0, mechaUnit:null,
      kiaB:0, kiaO:0, opsDone:0,
      troops:[],
      squads:[ mkSquad("141",1,true), mkSquad("BULL-6",1,false), mkSquad("RAZOR-2",1,false),
               mkSquad("KESSEL",-1,false), mkSquad("HARROW",-1,false) ],
  };
  for (var k=0;k<TN;k++) S.troops.push(mkTroop(k%2?1:-1));
  S.h=new Float32Array(N);
  genTerrain(); genHeight();
  for (var y=0;y<GH;y++) for (var x=0;x<GW;x++){
    var i=y*GW+x; if (S.terr[i]) continue;
    S.c[i] = x<4 ? 0.95 : x>=GW-4 ? -0.95 : 0;
  }
  ticks.length=0; feedBuf.length=0;
  tick("THEATRE 7 OPEN — lines advancing on both sides",'up',true);
  tick("141 is yours. tap the map to designate their objective",'rq',true);
}
function mkSquad(name,side,player){
  return { name:name, side:side, player:player, hp:4, morale:1,
           phase:"STAGING", pt:2+Math.random()*4,
           x: side>0?4:GW-4, y: GH*(0.25+Math.random()*0.5),
           obj:null, op:null, prog:0, heat:0, urge:false };
}
function genTerrain(){
  for (var r=0;r<4;r++){
    var x=(GW*0.25+Math.random()*GW*0.5)|0, y=(Math.random()*GH)|0, len=10+(Math.random()*22|0);
    for (var s2=0;s2<len;s2++){
      for (var dy=-1;dy<=1;dy++){ var yy=y+dy;
        if (x>=0&&x<GW&&yy>=0&&yy<GH) S.terr[yy*GW+x]=1; }
      var d=Math.random();
      if (d<0.42) y++; else if (d<0.84) y--; else x+=Math.random()<0.5?1:-1;
    }
  }
}
/* heightmap: coarse random grid, bilinear upsample; ridges sit on high ground.
   contours render from this; movement and weapons read it. */
function genHeight(){
  var CG=17, CH2=11, coarse=new Float32Array(CG*CH2);
  for (var k=0;k<coarse.length;k++) coarse[k]=Math.random();
  for (var y=0;y<GH;y++) for (var x=0;x<GW;x++){
    var gx=x/(GW-1)*(CG-1), gy=y/(GH-1)*(CH2-1);
    var x0=gx|0, y0=gy|0, fx=gx-x0, fy=gy-y0;
    var x1=Math.min(CG-1,x0+1), y1=Math.min(CH2-1,y0+1);
    var v=coarse[y0*CG+x0]*(1-fx)*(1-fy)+coarse[y0*CG+x1]*fx*(1-fy)
         +coarse[y1*CG+x0]*(1-fx)*fy+coarse[y1*CG+x1]*fx*fy;
    var i=y*GW+x;
    S.h[i]=Math.min(1, v*0.85 + (S.terr[i]?0.35:0));   // ridges crown the hills
  }
}
function caStep(){
  for (var k=0;k<2600;k++){
    var i=(Math.random()*N)|0; if (S.terr[i]) continue;
    var x=i%GW, y=(i/GW)|0;
    var l=x>0&&!S.terr[i-1]?S.c[i-1]:S.c[i], r=x<GW-1&&!S.terr[i+1]?S.c[i+1]:S.c[i];
    var u=y>0&&!S.terr[i-GW]?S.c[i-GW]:S.c[i], d=y<GH-1&&!S.terr[i+GW]?S.c[i+GW]:S.c[i];
    var avg=(l+r+u+d)/4;
    var v=S.c[i] + 0.13*(avg-S.c[i]) + (Math.random()-0.5)*0.014;
    if (Math.abs(v)<0.55) v-=v*0.04;
    if (x<3) v=Math.max(v,0.9); if (x>=GW-3) v=Math.min(v,-0.9);
    S.c[i]=v>1?1:v<-1?-1:v;
  }
}
function findHotspots(){
  var hs=[];
  for (var by=0;by<BY;by++) for (var bx=0;bx<BX;bx++){
    var pos=0,neg=0,sum=0,n2=0;
    for (var y=0;y<BW;y++) for (var x=0;x<BW;x++){
      var i=(by*BW+y)*GW+(bx*BW+x);
      if (S.terr[i]) continue; n2++; sum+=S.c[i];
      if (S.c[i]>0.12) pos++; else if (S.c[i]<-0.12) neg++;
    }
    if (!n2) continue;
    var clash=Math.min(pos,neg)/n2;
    if (clash>0.12) hs.push({b:by*BX+bx,x:bx,y:by,frac:Math.min(1,clash*3),mean:sum/n2});
  }
  hs.sort(function(a,b){return b.frac-a.frac;});
  S.hotspots=hs.slice(0,6);
}
function tideCalc(){
  var g=0,n2=0;
  for (var i=0;i<N;i+=5){ if (S.terr[i]) continue; g+=S.c[i]; n2++; }
  return g/n2;
}
function blast(cx,cy,rad,amt){
  for (var y=Math.max(0,cy-rad|0);y<Math.min(GH,cy+rad);y++)
    for (var x=Math.max(0,cx-rad|0);x<Math.min(GW,cx+rad);x++){
      var dd=Math.hypot(x-cx,y-cy); if (dd>rad) continue;
      var i=y*GW+x; if (S.terr[i]) continue;
      S.c[i]=Math.max(-1,Math.min(1,S.c[i]+amt*(1-dd/rad)));
    }
}
/* LAOE ordnance: reshapes the map and does not check IFF.
   craters the height field, avalanches ridges flat, kills EVERYONE inside. */
function strike(cx,cy,rad,amt){
  for (var y=Math.max(0,cy-rad|0);y<Math.min(GH,cy+rad);y++)
    for (var x=Math.max(0,cx-rad|0);x<Math.min(GW,cx+rad);x++){
      var dd=Math.hypot(x-cx,y-cy); if (dd>rad) continue;
      var i=y*GW+x, fall=1-dd/rad;
      S.h[i]=Math.max(0,S.h[i]-fall*0.55);                 // crater
      if (S.terr[i] && dd<rad*0.8) S.terr[i]=0;            // ridge avalanched flat
      if (!S.terr[i]) S.c[i]=Math.max(-1,Math.min(1,S.c[i]*0.25+amt*fall));
    }
  var ff=0;
  S.troops.forEach(function(tr){                           // friendly fire is fire
    if (tr.dead>0) return;
    if (Math.hypot(tr.x-cx,tr.y-cy)<rad){
      tr.dead=4+Math.random()*4;
      if (tr.side>0){ S.kiaB++; ff++; } else S.kiaO++;
    }
  });
  S.squads.forEach(function(sq){
    if (sq.phase==="DOWN"||sq.phase==="STAGING") return;
    if (Math.hypot(sq.x-cx,sq.y-cy)<rad && sq.side>0)
      teamHit(sq, sq.player?"OUR OWN ORDNANCE — danger close":"friendly ordnance");
  });
  if (ff>3) tick("strike caught our own line — "+ff+" friendly KIA","bad",true);
}
function bname(b){ return String.fromCharCode(65+b.y)+"-"+(b.x+1); }

/* ============ line troops: the default force. they ARE the push ============ */
function troopTick(tr,dt){
  if (tr.dead>0){ tr.dead-=dt;
    if (tr.dead<=0){ var nt=mkTroop(tr.side); tr.x=nt.x; tr.y=nt.y; }
    return; }
  var i=(tr.y|0)*GW+(tr.x|0);
  var here=(i>=0&&i<N)?S.c[i]:0;
  var owned=here*tr.side;
  var slope=1-(S.h[i]||0)*0.55;                      // high ground is slow ground
  if (owned>0.35){                                   // rear area: march to the front
    tr.jig+=dt*3;
    tr.x+=tr.side*dt*(4+Math.sin(tr.jig))*slope; tr.y+=Math.cos(tr.jig*0.7)*dt*2.5*slope;
  } else {                                           // at the front: fight for the cell
    if (!S.terr[i]&&i>=0&&i<N) S.c[i]=Math.max(-1,Math.min(1,S.c[i]+tr.side*dt*0.55));
    tr.x+=tr.side*dt*0.7*slope; tr.y+=(Math.random()-0.5)*dt*3;
    var danger=Math.max(0,-here*tr.side);
    if (Math.random()<dt*(0.02+danger*0.10)){ tr.dead=3+Math.random()*4;  // fall, respawn
      if (tr.side>0) S.kiaB++; else S.kiaO++; }
  }
  tr.y=Math.max(0,Math.min(GH-1,tr.y));
  tr.x=Math.max(0,Math.min(GW-1,tr.x));
}

/* ============ ops (SOF doctrine): ground dictates the mission ============ */
function opFor(sq,obj){
  var m=obj.mean*sq.side;
  if (m<-0.3)  return {id:"DA", name:"SABOTAGE",  desc:"direct action deep in hostile ground"};
  if (m>0.25)  return {id:"SR", name:"ESPIONAGE", desc:"special recon — harvest materiel"};
  var chok=0;
  for (var y=0;y<BW;y++) for (var x=0;x<BW;x++){
    var i=(obj.y*BW+y)*GW+(obj.x*BW+x); if (S.terr[i]) chok++;
  }
  if (chok>6)  return {id:"TG", name:"UPLINK",    desc:"terminal guidance — LAOE keys"};
  return       {id:"UW", name:"ASSAULT SPT",      desc:"force multiplier on the line"};
}
function opComplete(sq){
  var o=sq.obj, cx=o.x*BW+BW/2, cy=o.y*BW+BW/2;
  if (sq.side>0) S.opsDone++;
  if (!sq.player){ blast(cx,cy,7,sq.side*0.5); return; }
  switch (sq.op.id){
    case "DA": blast(cx,cy,11,0.85); S.req+=100;
      done("SABOTAGE executed — front broken","+100 req"); break;
    case "SR": S.mat++; S.req+=150; blast(cx,cy,4,0.2);
      done("ESPIONAGE haul secured","+1 MAT +150 req"); break;
    case "TG": S.mat+=2; blast(cx,cy,5,0.3);
      done("UPLINK hot — LAOE strike keys secured","+2 MAT"); break;
    default:   blast(cx,cy,8,0.55); S.req+=60;
      done("line assault carried","+60 req");
  }
  function done(msg,rw){
    tick("141: "+msg+" ("+rw+")","up",true); mark("141",true);
    S.receipts.push("◈ 141 "+sq.op.name+" @ "+bname(o)+" — <b>done</b>. "+rw);
  }
}
function squadTick(sq,dt){
  if (sq.phase==="DOWN"){ sq.pt-=dt; if (sq.pt<=0){ sq.phase="STAGING"; sq.pt=4;
      sq.hp=Math.min(4,sq.hp+2); if (sq.player) tick("141 refit — restaged","team"); } return; }
  if (sq.phase==="STAGING"){ sq.pt-=dt;
    if (sq.pt<=0){
      sq.obj=pickObjective(sq); if (!sq.obj){ sq.pt=3; return; }
      sq.op=opFor(sq,sq.obj); sq.phase="INSERT";
      if (sq.player) tick("141 inserting → "+bname(sq.obj)+" ["+sq.op.name+"]","team",true);
      else if (sq.side>0) tick(sq.name+" moving on "+bname(sq.obj),"team");
    } return; }
  var tx=sq.obj.x*BW+BW/2, ty=sq.obj.y*BW+BW/2;
  if (sq.phase==="INSERT"){
    var dx=tx-sq.x, dy=ty-sq.y, dist=Math.hypot(dx,dy);
    if (dist<2){ sq.phase="WORK"; sq.prog=0; sq.heat=0;
      if (sq.player) tick("141 on objective — "+sq.op.desc,"team"); return; }
    var sp=((sq.player&&sq.urge)?9:6)*dt; sq.x+=dx/dist*sp; sq.y+=dy/dist*sp;
    return;
  }
  if (sq.phase==="WORK"){
    sq.prog += dt*((sq.player&&sq.urge)?11:6.5)*sq.morale;
    blast(sq.x,sq.y,3,sq.side*0.05*dt*6);
    if (sq.player){
      sq.heat += dt*(sq.urge?1.4:0.55)*(1+Math.max(0,-S.c[((sq.y|0)*GW+(sq.x|0))]||0)*0.8);
      if (!S.cue && Math.random()<dt*0.3) raiseRequest(sq);
      if (sq.heat>10 && Math.random()<dt*0.18) teamHit(sq,"taking fire on the objective");
    } else if (Math.random()<dt*0.02){ sq.phase="DOWN"; sq.pt=12;
      if (sq.side>0) tick(sq.name+" mauled — pulling out","bad",true);
    }
    if (sq.prog>=100){ opComplete(sq); if (sq.player) S.cue=null; sq.phase="EXFIL"; }
    return;
  }
  if (sq.phase==="EXFIL"){
    var hx=sq.side>0?4:GW-4;
    var dx2=hx-sq.x, dy2=GH/2-sq.y, d2=Math.hypot(dx2,dy2);
    if (d2<3){ sq.phase="STAGING"; sq.pt=5+Math.random()*3; return; }
    sq.x+=dx2/d2*7*dt; sq.y+=dy2/d2*7*dt;
  }
}
function pickObjective(sq){
  if (sq.player && S.designated>=0){
    var bx=S.designated%BX, by=(S.designated/BX)|0, sum=0,n2=0;
    for (var y=0;y<BW;y++) for (var x=0;x<BW;x++){
      var i=(by*BW+y)*GW+(bx*BW+x); if (!S.terr[i]){sum+=S.c[i];n2++;} }
    S.designated=-1;
    return {b:by*BX+bx,x:bx,y:by,frac:1,mean:n2?sum/n2:0};
  }
  var mine=S.hotspots.filter(function(h){ return h.mean*sq.side<0.15; });
  if (mine.length) return mine[(Math.random()*Math.min(2,mine.length))|0];
  if (S.hotspots.length) return S.hotspots[0];
  var bx2=(BX/2-1+(Math.random()*3|0))|0, by2=(Math.random()*BY)|0;
  return {b:by2*BX+bx2,x:bx2,y:by2,frac:0.5,mean:0};
}
function teamHit(sq,why){

function raiseRequest(sq){

/* ============ LAOE: mecha drop / tomahawk / orbital ============ */
function mechaTick(dt){
  if (S.mechaCd>0) S.mechaCd-=dt;
  var m=S.mechaUnit; if (!m) return;
  m.t+=dt;
  if (m.t<0.2 && !m.landed){ m.landed=true; strike(m.x,m.y,9,0.5); } // impact craters, no IFF
  if (m.t<4){ blast(m.x,m.y,3+m.t*2.5,0.28*dt*8); }        // landing shock, area clears
  else if (m.t<14){ blast(m.x,m.y,4,0.06*dt*8); }          // holds the ground it took
  else { S.mechaUnit=null; tick("mecha expended — wreck holds the line","team",true); }
}
function fireLAOE(kind){
  var tgt=null;
  if (S.designated>=0){ var bx=S.designated%BX, by=(S.designated/BX)|0;
    tgt={x:bx*BW+BW/2,y:by*BW+BW/2}; S.designated=-1; }
  else { var hs=S.hotspots.filter(function(h){return h.mean<0;})[0]||S.hotspots[0];
    if (hs) tgt={x:hs.x*BW+BW/2,y:hs.y*BW+BW/2}; }
  if (!tgt){ tick("no target mass for strike","team"); return false; }
  if (kind==="MECHA"){
    S.mechaUnit={x:tgt.x,y:tgt.y,t:0};
    tick("MECHA DROP — clearing the grid square","up",true); mark("MEC",true);
    S.receipts.push("◈ MECHA deployed @ front — area cleared and held");
  } else if (kind==="TOMAHAWK"){
    strike(tgt.x,tgt.y,10,0.7);
    tick("TOMAHAWK impact — terrain cratered","up",true); mark("TMH",true);
    S.receipts.push("◈ TOMAHAWK strike (1 MAT)");
  } else {
    strike(tgt.x,tgt.y,16,0.9);
    tick("ORBITAL LANCE — the map remembers this","up",true); mark("ORB",true);
    S.receipts.push("◈ ORBITAL strike (3 MAT)");
  }
  return true;
}

/* ================= warclock ================= */
function advance(dt){
  if (S.over||S.paused) return;
  S.t-=dt;
  S.caTimer+=dt; if (S.caTimer>=0.12){ S.caTimer-=0.12; caStep(); }
  S.hotTimer+=dt; if (S.hotTimer>0.6){ S.hotTimer=0; findHotspots(); }
  for (var k=0;k<S.troops.length;k++) troopTick(S.troops[k],dt);
  S.squads.forEach(function(sq){ squadTick(sq,dt); });
  mechaTick(dt);
  if (S.cue){ S.cue.left-=dt; if (S.cue.left<=0){ S.cue.no(S.cue.sq); S.cue=null; } }
  S.req+=dt*2;
  S.tide=tideCalc(); S.hist.push(S.tide);
  if (S.t<=0 || Math.abs(S.tide)>0.55) end();
}
function end(){
  S.over=true;
  var v=S.tide>0.25?"LANDSLIDE — THEATRE TAKEN":S.tide>0?"MARGINAL HOLD":
        S.tide>-0.25?"MARGINAL LOSS":"COLLAPSE";
  document.getElementById("verdict").textContent=v;
  document.getElementById("receipts").innerHTML=
    "FINAL TIDE "+(S.tide*100).toFixed(0)+"% · REQ "+(S.req|0)+" · CAS "+S.cas+" · MAT "+S.mat
    +"\n\n"+(S.receipts.length?S.receipts.join("\n"):"(no operations)");
  document.getElementById("debrief").classList.add("on");
}

/* ================= render ================= */
function renderMap(){
  var now=performance.now()/1000, px=img.data;
  for (var i=0;i<N;i++){
    var o=i*4, v=S.c[i];
    if (S.terr[i]){ px[o]=46;px[o+1]=46;px[o+2]=53;px[o+3]=255; continue; }
    if (v>0.05){ var g=0.2+v*0.62; px[o]=216*g; px[o+1]=255*g; px[o+2]=61*g; }
    else if (v<-0.05){ var f=0.2-v*0.62; px[o]=255*f; px[o+1]=90*f; px[o+2]=42*f; }
    else { px[o]=32;px[o+1]=33;px[o+2]=38; }
    // topographic contours: faint line wherever the elevation band steps
    var x2=i%GW, lvl=(S.h[i]*5)|0;
    if ((x2<GW-1 && ((S.h[i+1]*5)|0)!==lvl) || (i<N-GW && ((S.h[i+GW]*5)|0)!==lvl)){
      px[o]=px[o]*0.72+232*0.28|0; px[o+1]=px[o+1]*0.72+228*0.28|0; px[o+2]=px[o+2]*0.72+216*0.28|0;
    }
    px[o+3]=255;
  }
  // troops as bright motes — the war is visibly made of people
  for (var k=0;k<S.troops.length;k++){
    var tr=S.troops[k]; if (tr.dead>0) continue;
    var oo=((tr.y|0)*GW+(tr.x|0))*4;
    if (tr.side>0){ px[oo]=235; px[oo+1]=255; px[oo+2]=160; }
    else { px[oo]=255; px[oo+1]=150; px[oo+2]=110; }
  }
  bctx.putImageData(img,0,0);
  mctx.clearRect(0,0,mapC.width,mapC.height);
  mctx.drawImage(buf,0,0,GW,GH,0,0,mapC.width,mapC.height);
  var sx=mapC.width/GW, sy=mapC.height/GH, d=window.devicePixelRatio||1;

  mctx.textAlign="center"; mctx.textBaseline="middle";
  S.hotspots.forEach(function(h){
    var cx=(h.x*BW+BW/2)*sx, cy2=(h.y*BW+BW/2)*sy;
    mctx.font=((10+h.frac*14)*d)+"px monospace";
    mctx.fillStyle = h.mean<-0.05?"rgba(255,90,42,.9)": h.mean>0.05?"rgba(216,255,61,.9)":"rgba(255,182,61,.9)";
    mctx.fillText("◈",cx,cy2);
  });
  if (S.designated>=0){
    var dbx=S.designated%BX, dby=(S.designated/BX)|0;
    mctx.strokeStyle="#ffb63d"; mctx.lineWidth=2; mctx.setLineDash([5,4]);
    mctx.lineDashOffset=-now*8;
    mctx.strokeRect(dbx*BW*sx,dby*BW*sy,BW*sx,BW*sy); mctx.setLineDash([]);
  }
  if (S.mechaUnit){
    var m=S.mechaUnit, mx=m.x*sx, my=m.y*sy;
    mctx.fillStyle="rgba(232,228,216,.95)";
    mctx.fillRect(mx-4*d,my-5*d,8*d,10*d);
    mctx.strokeStyle="rgba(216,255,61,.7)"; mctx.lineWidth=2;
    mctx.beginPath(); mctx.arc(mx,my,(6+Math.sin(now*4)*2)*d,0,Math.PI*2); mctx.stroke();
  }
  S.squads.forEach(function(sq){
    if (sq.phase==="DOWN"||sq.phase==="STAGING") return;
    var col = sq.player?"232,228,216": sq.side>0?"216,255,61":"255,90,42";
    var blink = sq.phase==="WORK" ? (Math.sin(now*7+sq.x)>0?1:0.4) : 0.95;
    mctx.fillStyle="rgba("+col+","+blink+")";
    var s3=sq.player?3.2:2.4;
    mctx.fillRect(sq.x*sx-s3,sq.y*sy-s3,s3*2,s3*2);
    if (sq.player){
      if (sq.obj){ mctx.strokeStyle="rgba(232,228,216,.35)"; mctx.lineWidth=1;
        mctx.beginPath(); mctx.moveTo(sq.x*sx,sq.y*sy);
        mctx.lineTo((sq.obj.x*BW+BW/2)*sx,(sq.obj.y*BW+BW/2)*sy); mctx.stroke(); }
      if (sq.phase==="WORK"){ mctx.strokeStyle="#d8ff3d"; mctx.lineWidth=2.5;
        mctx.beginPath(); mctx.arc(sq.x*sx,sq.y*sy,9,-Math.PI/2,-Math.PI/2+sq.prog/100*Math.PI*2); mctx.stroke(); }
    }
  });
}
function mark(label,up){ S.marks.push({k:S.hist.length,label:label,up:up}); }
function renderTrend(){
  var W=trC.width,H=trC.height,PADR=30;
  tctx.fillStyle="#17171b"; tctx.fillRect(0,0,W,H);
  var n2=S.hist.length; if (n2<2) return;
  var lo=Infinity,hi=-Infinity;
  for (var k=0;k<n2;k++){ if(S.hist[k]<lo)lo=S.hist[k]; if(S.hist[k]>hi)hi=S.hist[k]; }
  var span=Math.max(0.14,(hi-lo)*1.25), mid=(hi+lo)/2;
  function yOf(v){ return H/2-(v-mid)/span*H*0.86; }
  tctx.strokeStyle="#34343c"; tctx.setLineDash([3,4]);
  tctx.beginPath(); tctx.moveTo(0,yOf(0)); tctx.lineTo(W-PADR,yOf(0)); tctx.stroke(); tctx.setLineDash([]);
  tctx.strokeStyle=S.tide>=0?"#d8ff3d":"#ff5a2a"; tctx.lineWidth=2;
  tctx.beginPath();
  for (var k2=0;k2<n2;k2++){ tctx.lineTo(k2/(n2-1)*(W-PADR),yOf(S.hist[k2])); }
  tctx.stroke();
  tctx.font=(9*(window.devicePixelRatio||1))+"px monospace"; tctx.textAlign="center";
  S.marks.forEach(function(m,idx){
    if (m.k>=n2) return;
    var xx=m.k/(n2-1)*(W-PADR), yy=yOf(S.hist[m.k]);
    tctx.fillStyle=m.up?"#d8ff3d":"#ff5a2a";
    tctx.fillRect(xx-2,yy-2,4,4);
    tctx.fillText(m.label,xx,(idx%2?Math.min(H-4,yy+13):Math.max(9,yy-7)));
  });
}

/* ============ ticker (important) + two-line stepping overview ============ */
var ticks=[], feedBuf=[], feedPend=[];
function tick(m,cls,important){
  if (important){
    ticks.unshift({m:m,cls:cls||""}); if (ticks.length>6) ticks.pop();
    // seamless marquee: content doubled, animate -50%, speed from length
    var html=ticks.map(function(t2){
      return '<span class="'+t2.cls+'">'+t2.m+'</span>'; }).join('<span class="sep">◆</span>')
      +'<span class="sep">◆</span>';
    var el=document.getElementById("tickin");
    el.innerHTML=html+html;
    var chars=ticks.reduce(function(a,t2){return a+t2.m.length+3;},0);
    el.style.animationDuration=Math.max(14,chars*0.35)+"s";
  }
  feedPend.push({m:m,cls:cls||""});
  if (feedPend.length>=2) flushFeed();          // steps up two lines at a time
}
var feedFlushT=0;
function flushFeed(){
  while (feedPend.length){ feedBuf.unshift(feedPend.shift()); }
  if (feedBuf.length>2) feedBuf.length=2;
  document.getElementById("feed").innerHTML=feedBuf.map(function(f2){
    return '<div class="'+f2.cls+'">'+f2.m+'</div>'; }).join("");
}

/* ============ pixel-people force readout ============ */
function drawForces(){
  var W=fcC.width, H=fcC.height, d=window.devicePixelRatio||1;
  fctx.clearRect(0,0,W,H);
  var u=Math.max(2,Math.round(2*d));            // 1 voxel unit
  function person(x,y,col){ fctx.fillStyle=col;
    fctx.fillRect(x,y,u,u);                     // head
    fctx.fillRect(x-(u>>1),y+u+1,u*2,u*2);      // body
  }
  function mecha(x,y,col){ fctx.fillStyle=col;
    fctx.fillRect(x,y,u*3,u*2);                 // torso
    fctx.fillRect(x+(u>>1),y-u,u*2,u);          // head
    fctx.fillRect(x,y+u*2,u,u*2); fctx.fillRect(x+u*2,y+u*2,u,u*2); // legs
  }
  function missile(x,y,col){ fctx.fillStyle=col;
    fctx.fillRect(x,y,u,u*3); fctx.fillRect(x-(u>>1),y+u*3,u*2,u); // body+fins
    fctx.fillStyle="#ffb63d"; fctx.fillRect(x,y-u,u,u);            // tip
  }
  var pad=6*d, row=0, rowH=Math.max(14*d,(H-pad*2)/4);
  function label(t,y){ fctx.fillStyle="#8a8778"; fctx.font=(8*d)+"px monospace";
    fctx.textAlign="left"; fctx.textBaseline="top"; fctx.fillText(t,pad,y); }
  // row 0: allied line strength (1 glyph ≈ 12 troops alive)
  var blu=0,opf=0;
  S.troops.forEach(function(t2){ if (t2.dead<=0){ if (t2.side>0) blu++; else opf++; } });
  var y0=pad; label("LINE",y0);
  for (var k=0;k<Math.min(10,Math.round(blu/12));k++) person(pad+34*d+k*u*3.2,y0+2*d,"#d8ff3d");
  // row 1: hostile line
  var y1=pad+rowH; label("HOSTL",y1);
  for (var k2=0;k2<Math.min(10,Math.round(opf/12));k2++) person(pad+34*d+k2*u*3.2,y1+2*d,"#ff5a2a");
  // row 2: operators (141 = white, allies = acid)
  var y2=pad+rowH*2; label("OPS",y2);
  var ox=pad+34*d;
  S.squads.forEach(function(sq){
    if (sq.side<0) return;
    for (var h=0;h<sq.hp;h++){ person(ox,y2+2*d, sq.player?"#e8e4d8":"#d8ff3d"); ox+=u*3.2; }
    ox+=u*2;
  });
  // row 3: kinetics — mecha readiness + strike materiel
  var y3=pad+rowH*3; label("KIN",y3);
  var kx=pad+34*d;
  if (S.mechaCd<=0 && !S.mechaUnit){ mecha(kx,y3+3*d,"#e8e4d8"); kx+=u*5; }
  if (S.mechaUnit){ mecha(kx,y3+3*d,"#d8ff3d"); kx+=u*5; }
  for (var mm=0;mm<Math.min(6,S.mat);mm++){ missile(kx,y3+2*d,"#e8e4d8"); kx+=u*3; }
  for (var cc=0;cc<S.cas;cc++){ missile(kx,y3+2*d,"#8a8778"); kx+=u*3; }
}

function renderDeck(){
  var st=[["TIDE",(S.tide>=0?"+":"")+(S.tide*100|0)+"%",S.tide<0],
          ["REQ",S.req|0,S.req<80]];

        +'<div class="lrow"><span>OPS DONE</span><span><b>'+S.opsDone+'</b></span></div>'
        +'<div class="lrow"><span>ELAPSED</span><span><b>'+(180-S.t|0)+'s</b></span></div>'
        +'<div style="margin-top:2px;border-top:1px dashed var(--line);padding-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+lastOp+'</div>'
        +'</div>';
    })();
  var rb=document.getElementById("reqbar");
  if (S.cue){ rb.classList.add("on");

    rb.querySelector("#reqwin i").style.width=(S.cue.left/S.cue.dur*100)+"%";
  } else rb.classList.remove("on");
  document.getElementById("bclock").textContent=Math.max(0,S.t).toFixed(0);
  var tp=document.getElementById("tidepct");
  tp.textContent="TIDE "+(S.tide>=0?"+":"")+(S.tide*100).toFixed(0)+"%";
  tp.style.color=S.tide>=0?"#d8ff3d":"#ff5a2a";
  renderButtons();
}

/* ============ actions: vertical stack, press-arm-confirm ============ */

  { label:function(){ return "RECALL 141"; }, cost:function(){ return "abort op"; },
    can:function(){ return me().phase==="INSERT"||me().phase==="WORK"; },

function renderButtons(){

                        : "<span>"+d.label()+"</span><span class='cost'>"+d.cost()+"</span>";
    b.disabled = !d.can() || S.over;
    b.className = armed?"armed" : (d.hot&&d.hot()?"hot" : (d.tog&&d.tog()?"togon":""));
  }
}
["b0","b1","b2","b3","b4"].forEach(function(id,k){
  document.getElementById(id).addEventListener("click",function(){
    if (!BTN[k].can()||S.over) return;
    if (S.arm[k]>0){ S.arm[k]=0; BTN[k].fire(); renderDeck(); }
    else { for(var j=0;j<5;j++) S.arm[j]=0; S.arm[k]=2.5; renderButtons(); }
  });
});
mapC.addEventListener("pointerdown",function(e){
  var r=mapC.getBoundingClientRect();
  var bx=((e.clientX-r.left)/r.width*BX)|0, by=((e.clientY-r.top)/r.height*BY)|0;
  if (bx<0||bx>=BX||by<0||by>=BY) return;
  S.designated=by*BX+bx;
  tick("objective designated: "+bname({x:bx,y:by}),"team");
});
document.getElementById("btnpause").addEventListener("click",function(){
  S.paused=!S.paused;
  this.textContent=S.paused?"▶":"⏸"; this.classList.toggle("on",S.paused);
  document.getElementById("phase").textContent=S.paused?"THEATRE 7 // PAUSED":"THEATRE 7 // LIVE";
});
document.getElementById("again").addEventListener("click",function(){
  document.getElementById("debrief").classList.remove("on"); reset();
});

/* ================= loop ================= */
var last=performance.now();
function loop(now){
  var dt=Math.min(0.1,(now-last)/1000); last=now;
  advance(dt);
  feedFlushT+=dt; if (feedFlushT>3){ feedFlushT=0; if (feedPend.length) flushFeed(); }
  for (var k=0;k<5;k++) if (S.arm[k]>0){ S.arm[k]-=dt; if (S.arm[k]<=0){S.arm[k]=0; renderButtons();} }
  renderMap(); renderTrend(); renderDeck();
  requestAnimationFrame(loop);
}
fit(mapC); fit(trC); fit(fcC); reset(); requestAnimationFrame(loop);
</script>
</body>
</html>
