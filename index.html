<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>MECHAB</title>
  <meta name="description" content="MECHAB — procedural mech combat" />
  <meta name="theme-color" content="#e7e2d3" />
  <link rel="manifest" href="manifest.json" />
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MECHAB" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="baseline">
  <main id="device">
    <header id="topbar">
      <span id="clock">09:41</span>
      <span id="sysline">INTERLINKED · V-K · BASELINE 39</span>
      <span id="sig">•ıl 🜁</span>
    </header>

    <!-- HERO: persistent chassis, rendered per view -->
    <section id="hero">
      <nav id="viewtabs" aria-label="view">
        <button data-view="front" class="vt on">FRONT</button>
        <button data-view="side"  class="vt">SIDE</button>
        <button data-view="back"  class="vt">BACK</button>
        <button data-view="iso"   class="vt">ISO</button>
      </nav>
      <div id="mechwrap">
        <canvas id="mech" aria-label="subject render"></canvas>
        <canvas id="foe" class="hidden" aria-label="hostile render"></canvas>
        <div class="scan" aria-hidden="true"></div>
      </div>
    </section>

    <!-- HANGAR: the chassis roster (build phase only) -->
    <section id="hangar">
      <button class="cyc" data-intent="HG_PREV">◀</button>
      <span id="hgname">—</span>
      <button class="cyc" data-intent="HG_NEXT">▶</button>
      <button class="mini" data-intent="FORGE">+ FORGE</button>
      <button class="mini" data-intent="SCRAP">✕</button>
      <button class="mini" data-intent="REROLL">⟲ AUX</button>
    </section>

    <div class="rule"><span id="rulelabel">DEVIATION | BASELINE</span></div>

    <section id="datablock" aria-label="stream"></section>

    <!-- mech segments first, then the action text right under them -->
    <section id="statbars"></section>
    <section id="slots"></section>

    <!-- the telegraph: what's coming, before you choose (deploy only) -->
    <section id="inbound" class="hidden"></section>
    <section id="verbs"></section>
    <section id="log" aria-live="polite"></section>

    <footer id="controls">
      <button data-intent="DEPLOY" class="wide">▸ DEPLOY</button>
      <button data-intent="RETURN" class="wide hidden">◂ ABORT SORTIE</button>
    </footer>
  </main>

  <script src="parts.js"></script>
  <script src="mechgen.js"></script>
  <script src="foegen.js"></script>
  <script src="chassis.js"></script>
  <script src="combat.js"></script>
  <script src="input.js"></script>
  <script src="game.js"></script>

  <script>
  if ("serviceWorker" in navigator)
    navigator.serviceWorker.register("sw.js").catch(function(){});
  </script>
</body>
</html>
